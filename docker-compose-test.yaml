name: launchs-org-backend-mini-test

services:
  # テスト用 PostgreSQL
  postgres-test:
    hostname: db-test
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: root
      TZ: Asia/Tokyo
    volumes:
      - ./database/script/init-test.sql:/docker-entrypoint-initdb.d/init-test.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

  # テスト実行コンテナ
  app-test:
    hostname: app-test
    build:
      context: ./app
      dockerfile: dockerfile
      target: Develop
    volumes:
      - ./app/src:/app/src
    environment:
      # テスト用 DB 接続情報
      DB_HOST: db-test
      DB_USER: testuser
      DB_PASSWORD: testpass
      DB_NAME: testdb
      DB_PORT: 5432
      # JWT 公開鍵（テスト用ダミー値）
      JWT_PUBLIC_KEY: ""
    depends_on:
      postgres-test:
        condition: service_healthy
    # テスト実行して終了する
    command: ["go", "test", "./...", "-v", "-count=1"]
